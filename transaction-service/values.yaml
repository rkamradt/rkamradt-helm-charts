replicaCount: 1

image:
  repository: ghcr.io/rkamradt/transaction-service
  tag: "main"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8082
  targetPort: 8082

env:
  ACCOUNT_SERVICE_URL: http://account-service.fintech:8081
  USER_SERVICE_URL: http://user-service.fintech:8081

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 250m
