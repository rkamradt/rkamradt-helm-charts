replicaCount: 1

image:
  repository: ghcr.io/rkamradt/transaction-service
  tag: "main"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8082
  targetPort: 8082

envSecret: transaction-service-secret

env:
  ACCOUNT_SERVICE_URL: http://account-service.fintech:8081
  USER_SERVICE_URL: http://user-service.fintech:8081
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql.postgresql:5432/transactiondb
  SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
  SPRING_DATASOURCE_USERNAME: transaction_user
  SPRING_JPA_PLATFORM: org.hibernate.dialect.PostgreSQLDialect

startupProbe:
  failureThreshold: 30
  periodSeconds: 10

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 512Mi
    cpu: 250m
