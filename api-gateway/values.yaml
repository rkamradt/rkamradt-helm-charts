replicaCount: 1

image:
  repository: ghcr.io/rkamradt/api-gateway
  tag: "latest"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

auth0:
  domain: randyk.us.auth0.com
  audience: https://api.kamradtfamily.net

corsOrigins: "https://clodapp.kamradtfamily.net,https://architect.kamradtfamily.net"

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 200m

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 5

# Routes are configured in the configmap below
routes: |
  routes:
    - prefix: /architect
      upstream: http://architectai-api.rkamradt-platform:8080
      stripPrefix: true
