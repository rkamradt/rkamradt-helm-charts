replicaCount: 1

image:
  repository: ghcr.io/rkamradt/user-service
  tag: "main"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

envSecret: user-service-secret

env:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql.postgresql:5432/userdb
  SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
  SPRING_DATASOURCE_USERNAME: user_user
  SPRING_JPA_PLATFORM: org.hibernate.dialect.PostgreSQLDialect

startupProbe:
  failureThreshold: 30
  periodSeconds: 10

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 512Mi
    cpu: 250m
