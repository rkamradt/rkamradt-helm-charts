replicaCount: 1

image:
  repository: grafana/loki
  tag: "2.9.4"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3100

storage:
  size: 5Gi
  storageClassName: ""  # leave empty to use cluster default

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"
