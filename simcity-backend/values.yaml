replicaCount: 1

image:
  repository: ghcr.io/rkamradt/simcity-backend
  tag: "main"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

# Secret must contain SPRING_DATASOURCE_PASSWORD
envSecret: simcity-backend-secret

env:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql.postgresql:5432/simcity
  SPRING_DATASOURCE_USERNAME: simcity_user
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SPRING_H2_CONSOLE_ENABLED: "false"

startupProbe:
  failureThreshold: 30
  periodSeconds: 10

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m
