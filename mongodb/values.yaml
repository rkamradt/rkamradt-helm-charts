replicaCount: 1
 
image:
  repository: mongo
  tag: "7.0"
  pullPolicy: IfNotPresent
 
auth:
  rootUsername: admin
  # rootPassword is set via secret, not here - see secret.yaml
  existingSecret: mongodb-secret
  existingSecretKey: mongodb-root-password
 
storage:
  size: 5Gi
  storageClassName: ""  # leave empty to use cluster default
 
service:
  type: ClusterIP
  port: 27017
 
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
 
