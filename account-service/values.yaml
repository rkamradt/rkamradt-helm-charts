replicaCount: 1

image:
  repository: ghcr.io/rkamradt/account-service
  tag: "main"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

env:
  KAFKA_BOOTSTRAP_SERVERS: kafka.kafka:9092

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 250m
