apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express
  namespace: {{ .Release.Namespace }}
  labels:
    app: mongo-express
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: mongo-express
  template:
    metadata:
      labels:
        app: mongo-express
    spec:
      containers:
        - name: mongo-express
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8081
          env:
            - name: ME_CONFIG_MONGODB_SERVER
              value: {{ .Values.mongodb.server }}
            - name: ME_CONFIG_MONGODB_PORT
              value: {{ .Values.mongodb.port | quote }}
            - name: ME_CONFIG_MONGODB_ADMINUSERNAME
              value: {{ .Values.mongodb.adminUsername }}
            - name: ME_CONFIG_MONGODB_ADMINPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongodb.existingSecret }}
                  key: {{ .Values.mongodb.existingSecretKey }}
            - name: ME_CONFIG_BASICAUTH_USERNAME
              value: {{ .Values.basicAuth.username }}
            - name: ME_CONFIG_BASICAUTH_PASSWORD
              value: {{ .Values.basicAuth.password }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
