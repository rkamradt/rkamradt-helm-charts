replicaCount: 1

image:
  repository: mongo-express
  tag: "1.0.2-18"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

mongodb:
  server: mongodb.mongodb.svc.cluster.local
  port: 27017
  adminUsername: admin
  existingSecret: mongodb-secret
  existingSecretKey: mongodb-root-password

# Basic auth for the mongo-express web UI
basicAuth:
  username: admin
  password: admin

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"
