replicaCount: 1

image:
  repository: dpage/pgadmin4
  tag: "8"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

# Login credentials for the pgAdmin web UI
auth:
  email: admin@kamradtfamily.net
  password: admin

postgresql:
  host: postgresql.postgresql.svc.cluster.local
  port: 5432

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"
