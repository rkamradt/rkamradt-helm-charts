replicaCount: 0

image:
  repository: ghcr.io/rkamradt/vehicleupdateservice
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "kubernetes"
  - name: AXON_AXONSERVER_SERVERS
    value: "axon-server.axon-server.svc.cluster.local:8124"
  - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
    value: "health,info,metrics,prometheus"
  - name: SPRING_DATASOURCE_URL
    value: "jdbc:postgresql://postgresql.postgresql.svc.cluster.local:5432/vehicleevents"
  - name: SPRING_DATASOURCE_USERNAME
    value: "vehicle_user"
  - name: SPRING_DATASOURCE_PASSWORD
    value: "vehicle_pass"

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
