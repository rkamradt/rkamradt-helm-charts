replicaCount: 1

image:
  repository: ghcr.io/rkamradt/architectai-api
  tag: "main"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

envFrom:
  - secretRef:
      name: architectai-api-secrets

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 250m
